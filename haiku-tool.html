<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Haiku Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d1117;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .msg {
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 8px;
      max-width: 80%;
      white-space: pre-wrap;
    }

    .user {
      background: #238636;
      align-self: flex-end;
    }

    .bot {
      background: #161b22;
      align-self: flex-start;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #161b22;
    }

    textarea {
      flex: 1;
      resize: none;
      padding: 10px;
      background: #0d1117;
      color: white;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 20px;
      background: #238636;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <textarea id="input" rows="3" placeholder="Escribe o pega tu código..."></textarea>
  <button onclick="enviar()">Enviar</button>
</div>

<script src="https://js.puter.com/v2/"></script>

<script>
let historial = [
  {
    role: "system",
    content: "Responde como desarrollador práctico. Sé claro, directo y no compliques el código innecesariamente."
  }
];

function agregarMensaje(texto, tipo) {
  const div = document.createElement("div");
  div.className = "msg " + tipo;
  div.innerText = texto;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

async function enviar() {
  const input = document.getElementById("input");
  const texto = input.value.trim();

  if (!texto) return;

  agregarMensaje(texto, "user");

  historial.push({
    role: "user",
    content: texto
  });

  input.value = "";

  agregarMensaje("Pensando...", "bot");

  try {
    const res = await puter.ai.chat(historial, {
      model: "claude-haiku-4-5"
    });

    const respuesta = res.message.content[0].text;

    // quitar "Pensando..."
    document.getElementById("chat").lastChild.remove();

    agregarMensaje(respuesta, "bot");

    historial.push({
      role: "assistant",
      content: respuesta
    });

  } catch (e) {
    document.getElementById("chat").lastChild.remove();
    agregarMensaje("Error: " + e.message, "bot");
  }
}

// Enter para enviar
document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    enviar();
  }
});
</script>

</body>
</html>
